    "The 1980s RISC vs CISC debate was ferocious partly because architecture lacked quantitative methods; once measured, RISC needed ~30-40% more instructions but ran them 4-5x faster, a net 3-4x potential speedup.",
    "RISC effectively won: ARM (originally Acorn RISC Machine, renamed when Apple used it in the Newton) has shipped ~350 billion processors and ~99% of processors today are RISC; x86 survived by translating its instructions into RISC micro-ops in hardware, worth the overhead because of the PC binary software base.",

    "Dennard scaling ended around 2005 (chips could no longer stay at tens of watts), forcing multicore; then Moore's Law slowed in the 2010s, forcing the ~2015 turn to domain-specific architectures just as machine learning burst on the scene as the obvious target domain.",

    "The 'optimal' n^2 3SUM solution (sort plus two-finger search) can actually be beaten: group the sorted list into tiny blocks, preprocess a lookup structure via the linear decision tree model, and get roughly n^2 divided by polylog factors.",
    "Fine-grained complexity asks whether canonical algorithms are optimal in exact exponent, using reductions where a small improvement to one problem yields a small improvement to another \u2014 even relating NP-complete problems to P problems, impossible in classical reduction theory.",

    "Believing SETH is convenient because SAT reduces to edit distance and pattern matching, so it certifies many textbook polynomial algorithms as optimal in one stroke.",
    "His contrarian probabilities: 80% on P != NP (raised from 75% after Scott Aaronson objected) because algorithms constantly surprise while lower bounds rarely do; 45% on NEXP != EXP because super-compressible instances may be easy (possibly why SAT solvers work on structured real-world inputs); 80% on NEXP = coNEXP via a counting 'little birdie' argument he suspects is constructible in NEXP.",
    "His breakthrough improved the 1975 Hopcroft-Paul-Valiant T/log T space simulation of time T to about sqrt(T) space (at exponential time cost), building on Cook-Mertz tree evaluation: XOR computation into existing memory instead of writing into erased space, and split computation into sqrt(T) intervals of sqrt(T) steps.",
    "He spent months assuming his own result was buggy, rewrote it repeatedly, asked two colleagues to find the mistake (one wouldn't read past the abstract), and submitted to STOC still unsure \u2014 later expanding the one footnote that convinced a colleague into a 'warmup' section.",

   "label": "Co-Creator of Haskell: Functional Programming, Thinking in Types, Useless Languages | Simon Peyton Jones",

   "url": "https://www.developing.dev/p/co-creator-of-haskell-functional",
   "guest": "Simon Peyton Jones",
   "guest_role": "Co-creator of Haskell, GHC lead; now designing Verse at Epic Games",
   "takeaways": [
    "Functional programming is 'programming with values instead of mutation' \u2014 mathematics made executable; Church's lambda calculus and Turing's machine are provably equivalent in power, and Simon's research life has been one experiment: what happens if you exclude side effects by default?",
    "FP has been the mainstream's idea laboratory: garbage collection, lambdas, language-integrated query, parametric polymorphism, and static typing all grew up in functional languages before being adopted by imperative ones.",
    "Building hardware for functional languages (Lisp machines, MIT's Monsoon dataflow machine, the SKIM SK-combinator machine) was an 'inspiring mistake': it built interpreters in hardware, doing at runtime what a compiler does better at compile time, and could never compete with Intel's investment in x86 \u2014 even redesigning the ISA for FP would add almost nothing.",
    "C's unchecked mutation makes the Internet 'a boat built out of paperclips': writing infrastructure in Haskell or ML would remove roughly 99% of exploits (buffer overruns, pointer bugs) by construction, though no language prevents high-level flaws like deadlock; Rust keeps C's usefulness while moving far toward safety.",
    "Haskell started very safe but useless (version 1 had no I/O \u2014 a program was just a string-to-string function) and climbed toward usefulness without abandoning purity; laziness forced Haskell to stay pure and led to monads, while OCaml's strict evaluation order allowed impure I/O for free \u2014 he calls the two languages siblings that learn from each other.",
    "Laziness is modularity glue (John Hughes's 'Why Functional Programming Matters'): you can generate an infinite chess game tree in one module and prune/explore it in a completely separate one, where strictness forces you to fuse them; monads then make effects first-class typed values, with purity preserved because dirtiness is declared in types like IO Int, refined further by effect systems such as Tom Ellis's Bluefin.",
    "The biggest benefit of static types is maintainability and design: GHC is a 35-year-old Haskell codebase he refactors fearlessly by changing a type and following the wave of compile errors; weak type systems are strictly worse than strong ones, and dynamic typing should be an explicit escape hatch for the rare programs static types reject.",
    "GHC's architecture: parse, rename, typecheck, then desugar the ~50-node-type Haskell AST into Core \u2014 a tiny System F lambda calculus with about eight constructors that has barely changed in 35 years \u2014 then core-to-core optimization passes, C-- portable assembly, and native or LLVM backends; Core is fully type-checkable, which he claims no other production compiler's intermediate language is, catching optimizer bugs that would otherwise be distant segfaults.",
    "'Avoid success at all costs' is a deliberate double parse: don't seek success by compromising the core no-unrestricted-side-effects principle, and don't get so successful you can't change anything \u2014 though today he spends weeks on backward-compatibility work GHC never used to promise.",
    "LLMs 'may be the best thing that's happened to statically typed languages for a long time' because the compiler prunes the generation space in a tight iteration loop; but copilots need pilots \u2014 he won't merge unreviewed AI-generated code into GHC, students should still learn to program, and every child should know 'it's all just bits': ChatGPT is a trillion floating-point numbers plus arithmetic.",
    "His day job at Epic Games is Verse, a functional logic language exploring a region of design space as far beyond functional languages as FP was beyond imperative in 1980 \u2014 the same weird-but-worth-it bet, now with a games company's resources; and Excel is the world's most widely used programming language by three orders of magnitude, whose pure formula language became Turing complete when his 20-year push added LAMBDA.",
    "Advice to his younger self: all the successful people are making it up as they go along, so it's fine if you are too \u2014 and if you want to be lucky, put yourself in positions where lucky accidents can happen, which means taking risks."

   "takeaways": [
    "P vs NP is framed as the question of whether we can know everything we want to know: NP is all problems whose solutions we could recognize if handed to us, P is what we can solve efficiently, so P = NP would mean anything checkable is findable.",
    "The community's belief that P differs from NP rests on soft evidence \u2014 the lived intuition that finding is harder than checking, and decades of failed practical attacks on thousands of NP-hard optimization problems \u2014 and Wigderson admits it could be overturned by one new idea.",
    "Real-world instances are usually not worst-case: protein folding is NP-hard yet bodies do it constantly, the Simplex method is worst-case exponential but practically linear, and structured SAT instances from verification are why SAT solvers work so well in practice.",
    "The PCP theorem plus Hastad's strengthening shows approximation is hard too: for 3-variable Boolean constraints, random guessing satisfies 7/8 of them and doing epsilon better is already NP-hard.",
    "NP-complete problems are all inter-reducible because computation is local: any computation can be encoded as a conjunction of local constraints, which is why satisfiability (Cook, Levin) was the first NP-complete problem and most reductions are simple.",
    "Ryan Williams' 2025 result shows any time-T computation can be simulated in about sqrt(T) space, far beyond the T/log T bound of Valiant-Paul-Pippenger believed optimal for ~50 years; Barrington's constant-space majority counting via non-commutative permutations shows how counterintuitive small-space computation can be.",
    "Randomness is a resource whose quality depends on the observer's computational power (Blum-Micali coin-toss thought experiment): pseudorandomness only needs to fool the specific tests applied to it, though cryptographic secrets require genuinely random bits regardless of compute.",
    "Hardness versus randomness: if some sufficiently hard problem exists then P = BPP and all efficient probabilistic algorithms can be derandomized (Nisan-Wigderson generator), and conversely derandomization yields hard functions; extractors can purify weak physical sources into near-perfect randomness.",
    "Zero-knowledge proofs are universal: assuming one-way functions, anything provable has a zero-knowledge interactive proof (Goldreich-Micali-Wigderson), built from bit commitments and randomly permuted 3-colorings plus NP-completeness reductions that translate witnesses as well as instances.",
    "Shor's 1994 quantum factoring algorithm triggered both massive quantum hardware investment and post-quantum cryptography (lattice/learning-with-errors problems still resist quantum attack); the MIP* = RE result shows entangled quantum provers can convince efficient verifiers of uncomputable statements, and its techniques resolved long-standing math and physics conjectures."
   ],

   "id": "ep:dropboxs-former-most-senior-eng-building",

   "guest_role": "CTO and co-founder of Convex, former most senior engineer at Dropbox, MIT PhD in distributed systems",
   "takeaways": [
    "His MIT PhD work Granola (distributed transaction coordination via 'independent transactions' that avoid two-phase commit) predated and was cited by Google's Spanner; his Viewstamped Replication Revisited paper influenced companies like TigerBeetle. Core insight: performance at scale is about eliminating points of coordination, not faster hardware.",
    "A PhD is training to be a researcher, not more college; its real value is learning to sit with uncertainty on problems nobody can answer for you \u2014 an experience he is glad predated LLMs as a crutch.",
    "Dropbox's Magic Pocket achieved a modeled ~24 nines of durability via erasure coding (~27 fragments across racks, power feeds, drive vendors, regions); racing reads (e.g. need 6 of 9 fragments) make erasure-coded reads faster than unreplicated ones.",
    "Dropbox left S3 for strategic control and massive pre-IPO cost savings, exploiting first-at-scale Shingled Magnetic Recording disks and a tight understanding of its own workload; peak migration bandwidth was 764 Gbps and it was then the largest data migration in history \u2014 yet he advises nearly everyone else to stay on the cloud.",
    "The storage stack went Python to Go to Rust (both pre-GA): Go runtime OOMs looked like disk failures and could 7x load into congestion collapse, so storage nodes were rewritten in Rust addressing disks directly via draft ZBC specs with no filesystem.",
    "Migration discipline: a dark launch double-writing to S3 and Magic Pocket with six months of required zero-incident operation before deleting from S3; when a bug slipped through, he voluntarily reset the clock at double-digit-million cost and leadership thanked him.",
    "Simplicity is the hardest and most scalable property: the block index was 'just' 1,000 MySQL nodes that could be continuously walked for validation \u2014 design for validation and for what happens when the system doesn't work; he says AI/agentic development is bad at simplicity, which remains a human domain for now.",
    "Promotion systems that reward complexity anger him and partly drove him to found Convex; orient teams around missions (Storage team) not systems (Magic Pocket team) so nobody's identity depends on defending an obsolete system, and be willing to shut down inertia-driven projects.",
    "Career: choose working with the best people over 20% more pay; stay 3+ years to own the consequences of your decisions; don't enter management too early (ideally after reaching staff) or you'll lack technical depth to influence strategy; wanting management too much is a red flag.",
    "Don't lead by example \u2014 it's passive; his team assumed on-call heroics were 'James's job.' Teach explicitly, delegate ownership, and fix organizational conflict at the level of 'why' (demand 100% alignment on why, then trust the team on how)."
   ],

   "type": "episode",
   "label": "Creator of C++: Bell Labs, Negative Overhead Abstraction, Mistakes | Bjarne Stroustrup",
   "n": 46,
   "date": "2026-05-18",
   "url": "https://www.developing.dev/p/creator-of-c-bell-labs-negative-overhead",
   "guest": "Bjarne Stroustrup",
   "guest_role": "Creator of C++, former Bell Labs researcher",
   "takeaways": [
    "C++ was born from a failed attempt to build a distributed Unix at Bell Labs: no language combined low-level hardware access (C) with high-level structure (Simula classes), so Stroustrup merged them \u2014 after his Cambridge PhD ordeal of rewriting a Simula simulator in BCPL (~50x faster, cost 'half his hair') convinced him never to use inadequate tools again.",
    "Bell Labs research culture was 'hire the best people and don't tell them what to do': his job description was 'do something interesting in a year's time' reported on one sheet of paper; there was no formal interview \u2014 he flew over on his own tab, chatted with Dennis Ritchie and got a job offer by phone a week later.",
    "Dennis Ritchie helped design const and endorsed C++ as C's successor; the C vs C++ language wars were 'ridiculous.' Ritchie's fat pointers (pointer + size), rejected by the C committee, essentially became C++'s span decades later.",
    "On building languages: 'what do I need to build a language' is the wrong question \u2014 first identify a problem no existing language solves. C++ used C as its portable assembler to avoid touching 25 different linkers and dozens of optimizers: 'we can have Dennis Ritchie's mistakes, which we know, so we'll take Dennis's.'",
    "C++ was never object-oriented \u2014 it is type/class-oriented and deliberately supports non-OO styles; static typing was chosen because ~99% of computers are memory-constrained embedded systems that cannot drop into a debugger.",
    "On memory safety: over 90% of exploited C++ safety bugs (per Herb Sutter's data) come from C-style raw-pointer code; C++26 standardizes a hardened library option and his profiles work (proposed for C++29) aims to make safety guarantees enforceable by default.",
    "Standardization was forced on him in 1989 by IBM and HP representatives who could not depend on a corporate-owned language; C++ had a $5,000 total marketing budget versus Sun's Java campaign, yet C++ developers grew 10-12x since Java promised to kill it. The 527-member committee runs on judged consensus (~80-90%), not simple majorities, to prevent dialects.",
    "The Vasa battleship story he told the standards committee: adding a second gun deck to a half-built ship plus skipped stability tests sank it in 1624 \u2014 improve the foundation before adding features, never compromise testing, and sometimes the professional thing is to tell the bosses no.",
    "Performance: C++ can beat C ('negative overhead abstraction') because richer type information feeds the optimizer; 1990s-style clever hand optimization is often a pessimization on modern hardware \u2014 his first optimization step is deleting the clever code, guided by Knuth's 2-3% rule.",
    "On AI writing code: usable for boilerplate and documentation, but in safety/performance-critical domains LLM code brings more bugs, bloat, and an unsolvable validation burden (prompt changes perturb whole codebases, regulators require validated changes); eliminating junior programmers raises 'where do you get the senior programmers from?' and, echoing Dijkstra, natural language is too ambiguous to be a programming language."
   ],

   "takeaways": [
    "Malan was a government concentrator who took CS50 as a sophomore in 1996 under Brian Kernighan, got -2 on his first hello-world (void main), and switched fields because homework was fun for the first time in 19 years; he took over the course in 2007 after his PhD, initially as a one-year fill-in.",
    "CS50's online presence evolved organically: VHS filming in 1999, RealVideo streaming, MP3/RSS podcasting after the iPod (2003-04), video iPods later \u2014 with chained free DreamHost accounts and DNS trickery to evade bandwidth caps until Wired flagged it as a top podcast.",
    "CS50 deliberately keeps ~3-hour lectures and rejects the MOOC-style 3-5 minute chunk model: bite-sized content drives engagement but not educational outcomes, and online pause/rewind/search already fixes the zoning-out problem.",
    "His core lecturing technique is 'memorable moments' \u2014 tearing a phone book for binary search, students physically sorting on stage, numbers behind theater doors \u2014 theatrical anchors that help students retain material through the weekly firehose, knowingly trading depth for motivation on cherry-picked topics.",
    "Education wastes enormous effort with thousands of teachers redundantly producing the same lectures and assignments, but consolidation fails on school pride and institutional self-preservation; even during COVID Malan couldn't get Harvard to cross-list online courses with MIT/Stanford/Yale. CS50 at Yale (10 years) and Oxford remain exceptions.",
    "C remains the first real language because it's near-hardware with English-like syntax and no big standard library: students build hash tables, linked lists, tries, stacks and queues from scratch by week 5, then week 6 collapses it all into one line of Python dictionary \u2014 teaching what abstractions cost and enable.",
    "To 'full-stack devs don't need this' critics: you won't USE these things but you do need to KNOW them \u2014 first principles distinguish an engineer from a coder whose output AI can already generate.",
    "CS50's AI policy: off-the-shelf ChatGPT/Gemini/Copilot are banned for problem sets (Copilot would autocomplete all of mario.c from the filename), but students get unlimited CS50.ai, a deliberately less-helpful rubber-duck tutor on OpenAI/Azure APIs tuned to lead rather than answer.",
    "CS50 disciplines 5-10% of students each semester for academic dishonesty; AI hasn't increased detections but has made prosecution harder \u2014 no smoking-gun URL exists when the copied code is an amalgam of the whole internet.",
    "On studying CS in the AI era: the point was never programming but problem solving; AI eats the un-fun parts (boilerplate, tests, docs) while humans keep system/UX/data design \u2014 his morning Claude session was 90% right but hallucinated an API and had to be corrected, 'why the human should stay in charge for some time.' Current enrollment decline is another pendulum swing like the dot-com bust.",
    "Pointers in C are the perennially hardest concept \u2014 Malan still remembers the dining hall where 'it's just an address' clicked for him after weeks of struggle; his teaching prescription is metaphors and time ('take 24 weeks, take 52 \u2014 time is a perfectly reasonable knob to turn').",
    "Biggest regret: not exploring enough (Latin, Dramatic Arts, archeology came too late) and never working in industry \u2014 his sabbatical as professor-in-residence at GitHub was so fun he wishes he'd done it decades earlier. Advice to younger self: explore more, calm down.",

   "takeaways": [
    "White is bullish on Meta as a stockholder but bearish on being an employee: the engineer labor market flipped from undersupply to perceived oversupply (except frontier-lab AI researchers), so all of Silicon Valley makes fewer retention sacrifices in comp, perks, and employee voice; layoff fear now dominates employee stress and makes perk cuts tolerable.",
    "In Meta's AI Infra, literally everyone's first goal was promotion (unlike early Facebook, where it wasn't a thing); Monetization hired people with detailed promo-plan documents. Promo culture made teams ship projects everyone believed were bad and build maximally coupled systems to hit scope bars, decoupling promotion from skills that actually compound.",
    "You can't unilaterally disarm in a promo-driven org ('it's totally irrational not to play the game'), but you can choose teams: PyTorch selected for love of the craft and held such a high leveling bar that its IC8s beat other teams' IC10s, which ironically made its promo cases more credible externally. White took ~20% less compensation to work somewhere he was proud of.",
    "Career-growth story: joined Core Data Science as IC4 just as the 'emotional contagion' PNAS paper became Meta's worst PR disaster of the year (company-wide apology Q&A, regular meetings with the head of legal); later, all senior engineers on the experimentation team left within six months and he jumped from random IC5 to de facto TL of Deltoid 3, Meta's A/B testing framework \u2014 sudden-vacuum opportunities are underrated.",
    "Statsig is essentially Meta's Deltoid, and Airflow literally is Meta's DataSwarm (its author quit and open-sourced it a week later) \u2014 internal big-tech infra is a repeatable startup playbook; White regrets not building a Deltoid startup years earlier.",
    "Julia was built by MIT math people to destroy MATLAB; the case for it: naive R translations of plain C loops run 1,000-10,000x slower because dynamic languages pay for what users MIGHT do \u2014 R lets users redefine the brace operator, its lazy promise arguments are unneeded ~70-90% of the time (Vitek et al.), Python's inspect module can rewrite the symbol table. Fast languages have invariants; slow languages have runtime checks.",

    "Viewstamped Replication (with student Brian Oki) and Lamport's Paxos are essentially the same protocol invented independently; views are just incrementing numbers, not clocks. A former student consulting at Google recognized the Google File System's replication as Viewstamped Replication though Google thought it was Paxos. Paxos won mindshare because Lamport 'went around giving all the talks and she implemented it' \u2014 plus the catchier name.",

   "guest": "Ethan Evans",
   "guest_role": "Former Amazon VP, executive career coach",
   "takeaways": [
    "Empire building persists because headcount is the only promotion metric nobody can debate; after Evans left Amazon, some orgs required ~80-90 reports for director, effectively a several-hundred-thousand-dollar-a-year bonus for accumulating 90 people, and leaders parked people under candidates to check the box.",
    "Reorgs are 'hidden chess': the public business narrative coexists with private motives like retaining key people with juicier scope, giving disfavored people less, or platforming someone for promotion; leaders construct defensible storytelling for auditing parties.",
    "Quiet, dutiful high performers get unconsciously deferred for resources because management assumes they'll accept less; Evans tells coaching clients that being 'a very nice person' is not a compliment in this context \u2014 you must state what you want.",
    "Express career urgency without threats: Evans told his manager 'I need to understand how important my career is to Amazon because my career is very important to me' \u2014 the same underlying message as a quit threat but without triggering the extortion defense; delivery, warmth and timing determine how identical words land.",
    "Demanding high performers are easier to manage than nice ones: refuse them and they self-select out; instead make explicit deals (deliver on my priorities and I'll deliver your promotion) and always follow through \u2014 e.g. Evans got a senior manager to director by having him build Amazon's India dev center over three years.",
    "Large companies run 'forward looking slates' of promotions over 6-24 month windows; modern quota systems (e.g. Google allowing two L8-to-L9 promos per half per org) create literal queues, and million-dollar senior IC positions are not handed out 'like popcorn'.",
    "Never mutiny alone against a bad manager: a lone complaint is cheaper for the skip to dismiss than to believe (believing creates three problems: managing out, backfilling, absorbing the work); two or three corroborating reports flip the calculus.",
    "To escape a bad manager, first try a pure business case for the move without mentioning the manager; failing that, keep it blame-free ('maybe it's him, maybe it's me, I need a change'); Evans unlocked his own blocked move overnight by reframing the choice as 'keep me on your team or lose me entirely' backed by a competing SVP offer.",
    "Defending org scope from raids: bundle unglamorous essential work into the story, respond quickly and thornily to attacks, use strong metrics to delay, and 'be the better storyteller' \u2014 attackers underestimate others' complexity (S3 dismissed as 'just a big disk drive') because respect between teams is inversely proportional to distance.",
    "Influence and politics are the same skill set distinguished only by motive ('Darth Vader had executive presence in spades'); treat cross-functional partners as people with competing pressures rather than APIs, use 'how can you help me' framing, and pre-plan opening moves like chess."

   "id": "ep:meta-hiring-lead-on-behind-the-scenes",

   "url": "https://www.developing.dev/p/meta-hiring-lead-on-behind-the-scenes",
   "guest": "Austen McDonald",
   "guest_role": "Former Meta hiring committee lead for mobile, interview coach",
   "takeaways": [
    "Hiring committees open a senior packet at the behavioral interview first, because scope, influence and insight determine leveling far more than coding performance; the pipeline runs sourcer -> phone screen -> onsite -> committee (hire/no-hire + level) -> director approval.",
    "Initial leveling is set by years of experience and previous title; FAANG titles map across roughly one-to-one, while non-FAANG titles get downleveled significantly for level inflation (a manager of 50-75 elsewhere may map to managing 8-10 FAANG engineers).",
    "Fabricating seniority essentially never works: staff+ phone screens include scope-check project walkthroughs, and highly calibrated senior onsite interviewers expose vague or AI-generated stories with follow-ups; McDonald never saw a confirmed successful liar in thousands of interviews.",
    "Every story should communicate three dimensions \u2014 technical depth, organizational depth, business impact ('I organized across 100 engineers on a 12-month performance project requiring multiple staff engineers' vs 'I improved performance in the Facebook app'); a crisp tell-me-about-yourself is the highest-leverage prep because everyone listens for the same signal.",
    "The recruiter call is an evaluating call: recruiters advocate for you but are incentivized by hires and 'are not your friend' \u2014 avoid early compensation anchoring, use CA/NY salary-band disclosure laws, and hold multiple simultaneous offers as the main negotiation lever.",
    "You can negotiate level mid-process: get the loop run at the target level so the committee collects all signal at once, anchor every interviewer at that level in your opening, and answer the 'question behind the question' with your highest-scope stories \u2014 committees both uplevel and downlevel based on demonstrated scope.",
    "Referrals matter most on the bubble: a VP/director who directly worked with you stakes their reputation (and can advocate inside the committee room), and you should draft the referral content for them; but for engineers no referral overrides unanimous no-hire consensus, though senior manager/director hiring is more about who you know.",
    "Meta's behavioral rubric, built by industrial-psychology 'selection scientists', has five signals: driving results, embracing ambiguity, resolving conflicts, growing continuously, communicating effectively; get the rubric from the recruiter beforehand and run the decode-select-deliver loop, remixing core stories like movie trailers per question.",
    "Story selection priority is scope > relevance > recency (2-3 years, scaled by career length) > uniqueness across rounds; top senior mistakes are wrong-scope stories, over-context (30 seconds without an action verb means rethink), stories open to uncharitable interpretation, omitting non-technical work, and unstructured multi-year stories (fix with an upfront table of contents).",
    "Prep by level: juniors nail technical and show thinking/slope; mid-levels need balance because agentic coding makes end-to-end ownership the key behavioral signal; senior+ should start behavioral prep alongside leetcode since behavioral rounds differentiate while technical rounds become pass/fail checkmarks, and coding flubs are forgiven at staff/principal/manager levels.",
    "AI-lab values tailoring: OpenAI's 'Feel the AGI' looks for genuine optimism about AI's potential; Anthropic's 'Hold Light and Shade' requires articulating both positive and negative implications and showing you assessed and mitigated risks in past AI projects.",
    "Likability bias scales exactly with level: structured rubrics suppress subjective vibes for junior candidates, but senior roles are about influencing people, so confidence and 'casual excellence' in the room legitimately affect outcomes."
   ],

   "takeaways": [
    "Bolin's three-step career algorithm: figure out what you genuinely love doing, figure out what is invaluable to your employer, and lean hard into the intersection; he left Google after four years because his passion projects (Google Tasks, Closure tools, a book on Closure) weren't what Google valued.",
    "He built the Buck build system as a hackathon project against near-universal advice, with an existing internal competitor and Google's Blaze looming; conviction came from an 'existence proof' (he'd seen Blaze work) plus first-principles insight that caching unchanged build steps and making modules cheap to add would yield multi-x speedups.",
    "His influence tactic for starting disruptive projects without credibility: deliberately scope-couch them ('just an Android build system', 'just an iOS editor'), borrow credibility from a respected supporter, and let adoption come voluntarily \u2014 the iOS team asked for Buck a year later, and Uber and Airbnb adopted it externally.",
    "After his E8 promo he failed at a 'hero quest' fixing facebook.com web speed; the lesson was that he succeeds on projects that involve writing lots of code from scratch, not data-analysis and alignment-heavy work, and that senior managers deserve more recognition for pairing senior ICs with the right projects.",
    "His E9 Distinguished promo was delayed after he pushed too aggressively when Microsoft acquired GitHub, correctly predicting Nuclide's Atom foundation would lose to VS Code; the coaching lesson was about how he pushed (recognize triggers, don't act in the moment, go through managers), not what he argued.",
    "The Eden virtual filesystem lazily materializes files in Meta's monorepo, and his Myles file-search service used parallel arrays and a 64-bit character bitmask for cache-friendly fuzzy search over a million-plus files in 10-20ms, running on about 30 servers globally by the time he left.",
    "He joined OpenAI because building LLM dev tools at Meta on Llama 2 couldn't compete with GPT-4, and he wanted to co-develop product with the researchers building the best model; in a research-led culture, 'if the model weren't very good, it wouldn't really matter what we did on the harness.'",
    "Codex CLI launched rushed in April 2025; Codex Web was ahead of its time because local agents had stronger product-market fit; the August 2025 confluence of GPT-5, a new TUI, open-weights model support, and the VS Code extension created the inflection to 1M+ users and 5x usage growth, though he believes most agent compute will ultimately move to the cloud.",

   "id": "ep:distinguished-eng-on-stack-ranking",
   "type": "episode",
   "label": "Distinguished Eng On Stack Ranking, Competing with Bezos, Regrets | Bryan Cantrill",
   "n": 35,
   "date": "2026-03-02",
   "url": "https://www.developing.dev/p/distinguished-eng-on-stack-ranking",
   "guest": "Bryan Cantrill",
   "guest_role": "Co-founder/CTO of Oxide Computer, ex-Sun Distinguished Engineer, ex-Joyent CTO",
   "takeaways": [
    "Cantrill never goaled on rank: 'I would much rather be under promoted than over promoted.' Promotions happened as a byproduct of doing the most important work, and his career highlights were hard bugs and 'impossible' projects, never the promos themselves.",
    "Sun's rating system forced a promotion whenever a 'superlative' grade was given, so managers apologetically withheld the top grade because promos were rationed to every 18 months; formalized annual performance review 'never resulted in me having higher performance.'",
    "Stack ranking ('rank and yank') is 'organizational cancer': firing a bottom percentage incentivizes managers to keep dead weight as sacrificial fodder \u2014 which he saw at Sun \u2014 and it teaches you that your team are adversaries when it's teams that do extraordinary things. Oxide has no ranks at all because 'ranks are corrosive.'",
    "Sun's Distinguished Engineer promotion was a political 'country club' vote by existing DEs, with a side door for acqui-hired CTOs; Cantrill only escaped the politics because Sun's CTO Greg Papadopoulos personally presented his case and it passed unanimously.",
    "To engineers goaling on titles or financial independence he prescribes finding meaning instead: he can introduce you to miserable Distinguished Engineers and miserable wealthy people, dot-com winners who cashed out often floundered for a decade, and even meaningful shipped goals produce 'postpartum in engineering.'",
    "After the dot-com bust Sun lost 98% of its value (trading below cash), ran roughly 35 rounds of layoffs over eight years, and engineers scripted the employee directory into a daily 'obits' report to see who was gone; McNealy's delay in starting layoffs was a mistake.",
    "He quit Oracle about 45 days after the acquisition closed because he was ashamed to work there: Sun had its customers' trust and Oracle \u2014 'an octopus that knows how to feed itself' \u2014 does not; meanwhile other Sun engineers lobbied to get on the layoff list for the rich severance.",
    "Bezos is 'the apex predator of capitalism': Amazon hid AWS's great margins by refusing to break out revenue and relentlessly cut prices at every re:Invent from 2010-2015, convincing the world the cloud was a bad business so nobody would enter \u2014 while Joyent, competing directly, knew the margins were excellent.",
    "Oxide's founding lesson: a famous VC who had emailed 'I will fund literally anything you put in front of me' refused the computer-company pitch in 45 seconds, but when a VC asks 'how can I help?' you should have a concrete answer \u2014 Cantrill asked for an intro to a failed similar startup's founder and learned it died from a tiny real market plus premature go-to-market scaling. Oxide's MVP was a full rack that took 3+ years; they deliberately neither compete nor partner with Nvidia, focusing on general-purpose compute.",
    "Boom/bust advice for the AI era: cycles are endemic to software, so be your own judge \u2014 people said operating systems were done in 1996 and that you couldn't start a computer company in 2019, and he's glad he ignored them; don't pick a space just because it's hot."

   "id": "ep:turing-award-winner-on-working-with",
   "type": "episode",
   "label": "Turing Award Winner On Thinking Clearly, Paxos vs Raft, Working with Dijkstra | Leslie Lamport",
   "n": 34,
   "date": "2026-02-23",
   "url": "https://www.developing.dev/p/turing-award-winner-on-working-with",
   "guest": "Leslie Lamport",
   "guest_role": "Turing Award winner, inventor of Paxos, LaTeX, and logical clocks",
   "takeaways": [
    "The Bakery algorithm was born of spite: Lamport's first submitted mutual-exclusion algorithm came back from the CACM editor with a bug, teaching him that concurrent programs need correctness proofs; the resulting algorithm remarkably requires no lower-level atomicity \u2014 a read overlapping a write can return any value and it still works.",
    "His one collaboration with Dijkstra (simplifying the first concurrent garbage-collection algorithm) earned unexpected co-authorship; Dijkstra later said Lamport had a remarkable ability at abstraction, which Lamport now credits \u2014 rather than raw intelligence \u2014 for his Turing Award.",
    "The 'Time, Clocks' happens-before definition is special relativity transposed to distributed systems (messages instead of light), but the paper's second, more practically important idea \u2014 building any distributed system as a replicated state machine \u2014 was completely ignored for years.",
    "Understand concurrent systems via invariants, not behavioral reasoning over sequences: behaviors explode exponentially while invariance proofs grow roughly quadratically in the number of processes; invariants are 'the method that works, that you can be sure will work.'",
    "He wrote the first digital signature algorithm on a napkin in a coffee house for his friend Whit Diffie before Diffie-Hellman was published; signatures explain why Byzantine agreement needs 4 processes for 1 arbitrary fault without them but only 3 with them.",
    "He invented the 'Byzantine Generals' story as deliberate marketing after seeing Dijkstra's Dining Philosophers become famous for its cute story; he almost called it 'Albanian generals.' The result mattered because fly-by-wire aircraft were coming and engineers wrongly assumed 3 computers tolerate one arbitrary fault \u2014 a Boeing engineer's reaction was 'Oh, shit, we need four computers.'",
    "Paxos began as an attempted impossibility proof of DEC SRC's distributed storage consistency code that inverted mid-proof into the algorithm itself; the paper sat 8 years unpublished because referees called it 'not terribly important' \u2014 only Butler Lampson grasped it and proselytized state-machine replication.",
    "On Raft, he told the authors 'send it back to me when you have a proof'; the version of Raft that user studies found 'more understandable' than Paxos contained a later-discovered bug, showing that for most people understanding means 'a warm fuzzy feeling' while for him it means being able to write a proof.",
    "'If you're thinking without writing, you only think you're thinking': writing instruction manuals before programs and hierarchically structured proofs exposes unstated 'obvious' steps where errors hide; mathematicians reacted to his proof style with anger he attributes to fear of being made honest.",

    "From April 2020, Facebook video ran at New Year's Eve peak load every day; his org fixed race conditions in systems never designed for that sustained load while 3.5B users (vs Netflix's ~300M) depended on the apps.",

    "Ernst ran a software company in middle school (Cosmic Soft), selling REALbasic online-testing software to teachers worldwide via a proto-Stripe and $19.95 mailed checks.",

    "His E6 promo came from replacing Apple's Core Data (which 'falls over completely' beyond a small team) with MemModels, an immutable model system, over pushback from engineers loyal to vanilla Apple frameworks that don't scale to Meta's size.",
    "His influence-without-authority playbook: talk in person, open by sympathizing with the other side, do deep research (his team disassembled Core Data's closed source to prove why it couldn't work), and 'do the work for them' so teams only have to say yes.",
    "Code review is undervalued: he reviewed 1,600+ diffs in a half (~14 per workday) as an organic, viral channel of influence; good comments explain why rather than dictating, stay flexible, and invite missing context.",
    "ComponentKit (his IC7 promo project, 2014) brought React concepts to iOS before Swift, SwiftUI, or React Native existed, at the nudge of manager Lee Byron (GraphQL co-inventor); adoption required concrete code comparisons, performance data, heavyweight allies, senior mediators, and compromise with the rival Panels framework.",
    "ComponentScript, his two-year cross-platform framework, was 'a total and complete failure' despite checking every technical box: it targeted no specific engineer persona, he refused to compromise on GraphQL data consistency while a server-driven rival skipped it and won, and he went wide instead of landing one committed anchor team. Lesson: technically excellent doesn't mean it will win.",
    "A Meets Most rating and a fresh-eyed new manager forced the cancellation he had avoided for a year despite gut-level sleepless nights; his coding-machine reflex of 'just write more code' was the wrong response to a failing project.",
    "He killed ComponentScript responsibly \u2014 migrating every feature off it, deleting the framework from the repo, and publishing a candid public postmortem \u2014 and believes he gained more goodwill than he lost.",
    "He never wanted management: he loves writing code, is weaker at docs and alignment, and communicates best when anchored to concrete technical problems.",
    "His depth-plus-breadth method: when blocked by another team's system, dive 'eight levels deep' into its guts and show up with the diagnosis instead of a ticket \u2014 impressing owners, saving their time, and organically accumulating cross-system expertise.",
    "On IC9 expectations he has 'flipped the switch off': he checks with his manager that he's solving problems that matter to the org, then works without meta-anxiety, treating the worry itself as counterproductive.",
    "The engineers he admires span archetypes: coding machine Dustin Shahidipour, fixer Wei Han, project-starter Michael Bolin (Buck, Miles), communicators Bob Baldwin and Oliver Ricard, and alignment-driver Nolan O'Brien who manages the Meta-Apple relationship.",

    "Olson failed his 2011 Facebook internship interview so badly the interviewer cut it short and said 'you're just not gonna be able to make it at Facebook' \u2014 he later reached IC8 there, and for full-time interviews used prescribed beta blockers to break the physical nerves feedback loop.",
    "At ~50-person Flipboard he interned alongside future billionaires Dylan Field (Figma) and Devin Finzer (OpenSea); what marked them out was determination to found companies and conviction in a technical insight (WebGL) they iterated toward product-market fit.",
    "His open-source iOS debugging tool FLEX got him the Instagram job \u2014 interviewers refused to look at it, but engineer Jonathan Dan saw it, pulled him into the pipeline, and advocated for him after a mixed loop.",

    "On the Whiteout redesign he built behind a feature flag with semantic colors instead of a long-lived branch, which saved the launch when a Facebook exec demanded A/B tests the night before shipping; his lesson is that testing is invaluable for mechanics but product direction needs strong opinions \u2014 pure experimentation traps you in 1% incrementalism.",
    "Instagram Stories was built in about 2-3 months after he cut the team down to a core of two iOS engineers with no dedicated server engineer: 'if you want to go fast, go small.' The existing friend graph was the unfair advantage over Snapchat, and he invented hold-to-pause because his thumb expected it to work.",
    "His promo strategy: as a mis-leveled IC4 he asked his director for a 4-to-6 double promo knowing HR would refuse, deliberately seeding the idea so it converted into back-to-back promotions (IC5 for Whiteout, IC6 for Stories). Levels and promotions are an incentive system \u2014 a dangled carrot \u2014 and delays are often pacing, not performance.",
    "IGTV (his IC7 project with Kevin Systrom) failed despite anticipating vertical video: long-form vertical inventory never appeared and creators were horrified by his patented AI landscape-to-vertical reformatting; the era's confusing strategy calls only made sense years later via the antitrust lawsuit's internal memos about Facebook fearing Instagram cannibalization.",

   "url": "https://www.developing.dev/p/stanford-phd-ai-researcher-and-quant",

   "takeaways": [
    "A PhD is rarely strictly required outside academia but opens doors in AI research and quant finance and shapes the role: infra/data engineering work doesn't need one, while exploratory architecture-design research benefits; its core skill is that 90% of research is finding the right, tractably-scoped problem.",
    "Research taste comes from constantly skimming the literature (his main feed is a curated X/Twitter follow list grown from Stanford contacts) and maturing gradually from small extensions of existing work to wholly new ideas \u2014 skipping that maturation is inadvisable.",
    "Contrary to reputation, he had great work-life balance as a Citadel quant because trader schedules anchored to US market hours shape the whole culture; he believes quant now has better work-life balance than hyper-competitive AI research where people gain edge by outworking rivals.",
    "Quant comp has no standardized levels like tech; it's opaque, driven by firm/team/strategy performance and seniority, heavily bonus-weighted on the alpha side, with paid garden-leave non-competes of typically six months to two years decided by the company at departure.",
    "Finance is far more secretive than tech: pods within one firm may unknowingly work on the same strategies because sharing is forbidden (partly to keep returns uncorrelated); returning to tech he was jarred that people 'just tell you that for free.'",
    "Quant job security is U-shaped: senior quants become expensive relative to market rate and can stop being worth it even when good; the culture is up-or-out with regular trimming, easiest where P&L makes performance unambiguous. Insider-trading workarounds get people fired, sued, and jailed.",
    "His quant firm tier list: Rentech is the mythical gold standard; Jane Street, Citadel, Jump Trading, Hudson River are the strong big names; TGS, XTX, and Radix are elite smaller secretive shops.",
    "He left Citadel for Cartesia \u2014 founded by fellow Chris R\u00e9 lab members including Mamba creator Albert Gu \u2014 deliberately taking startup risk after establishing stability; Cartesia builds voice AI and competes with ElevenLabs (an ~18-month head start) on latency, cost, and voice cloning while pushing toward end-to-end speech models replacing the lossy STT-LLM-TTS pipeline.",
    "Big labs have compute but suffer groupthink and risk-aversion toward out-of-the-box ideas; startups can challenge orthodoxy \u2014 e.g., Mamba disproving that transformer scaling had solved sequence modeling, and Cartesia's H-Nets learning tokenization from raw characters.",
    "SSMs compress context into a fixed-size state (like a brain) while transformers' KV cache grows linearly (like a database); hybrids interleaving both are the text cutting edge, but for redundant modalities like audio SSM compression is 'almost a free lunch,' improving quality and inference cost simultaneously.",
    "He's skeptical of research-only startups (all-or-nothing vs resource-rich big labs) and product-only wrapper companies (no moat once base models improve); the durable position is the product-research intersection where the product drives research and model control protects the product.",
    "Advice for SWEs wanting AI research: build fundamentals (coding, math, reading papers) until opportunities come to you; big companies silo you, so a master's credential or a flexible startup helps \u2014 Cartesia has converted SWEs to researchers internally, but you need evidence of the skill set.",
    "His biggest regret is the time he spent regretting decisions that didn't matter; advice to his younger self is to focus on deep technical skills and not spread thin \u2014 'a simple recipe that's very hard to follow.'"
   ],

   "takeaways": [
    "Laurent pitched his own transition into management at Airbnb rather than waiting to be asked; he argues most engineers passively hope for what they want instead of explicitly aligning with their manager on career goals.",
    "As a manager he tracked a 'surprise factor' metric: before each performance review, he and the report each wrote the expected rating/promotion on paper and revealed simultaneously; any mismatch (including positive surprises) counted as a coaching failure.",
    "Calibrations have untold, locally-developed rules \u2014 e.g. changing roles less than ~2.5 months before cycle end yields an automatic 'meets expectations' \u2014 and one such rule cost him a likely staff promotion when he moved into management mid-cycle.",
    "To dispute bureaucratic rules, don't fight them in the calibration room; go one-on-one, gather evidence, and first learn the story behind the rule \u2014 sometimes it convinces you, sometimes it exposes a stale precedent.",
    "Instead of measuring engineers by lines of code or PR counts, he instrumented the full journey of a code change at Stripe (think, write, CI, review, merge), turning an unfair individual ranking into actionable org-level friction data.",
    "As uber TL over 35 (eventually 140) engineers at Stripe, he built credibility by embedding in each team for weeks, never justifying decisions with 'it worked at Facebook', and influencing almost entirely by asking questions \u2014 he says he never outright rejected a design.",
    "Situational leadership transformed his coaching: match style (directing, selling, supporting, delegating) to the learner's mastery and motivation; a 'failing' Facebook bootcamp mentee became his strongest after he stopped directing and switched to supporting.",
    "The senior-to-staff promotion is a bigger mindset shift than staff-to-senior-staff: staff engineers must independently identify problems, pitch them, and solve them end to end, while seniors typically solve problems others chose; higher levels are the same loop at larger scope.",
    "To find staff-worthy problems, 'channel your inner frustration' \u2014 Stripe institutionalized this as friction logs, screenshotting each step of a flow and interrogating every friction point; he could find 50-60 improvements in a single code-change flow.",
    "Airbnb's designer-led culture hired actual firefighters and crisis-management professionals to run incident management \u2014 a practice he considered genius and carried to later jobs.",
    "Boredom is a career signal that something must change: it drove his manager-to-IC switch once his team ran itself, and the four-year equity cliff drove his exit from Airbnb back to Meta/Instagram.",
    "Advice to younger self: the industry changes faster than you think \u2014 stay on top of it (he reads the weekly top of Hacker News, hn.algolia.com, and has his whole career); most career-impacting book: Radical Candor by Kim Scott."

   "guest_role": "Instagram/Threads Senior Staff Engineer (IC7), first engineer on Threads Web",
   "takeaways": [
    "Ratings measure delivered impact while promotions (lagging) measure sustained next-level behaviors: Marius greatly exceeded expectations as an IC4 but was blocked by one behaviors miss (too pushy in cross-functional collaboration), then blocked again by Meta's company-wide COVID promo freeze.",
    "His response to blocked promos: keep doing next-level work anyway \u2014 you can't be defeatist and regress to your current level's behaviors, because promotions require sustained demonstration.",
    "His IC5 promo came from leading a clearly-classified IC6 project (10+ engineers plus PMs/designers) as an IC4; doing next-next-level work is what separates 'redefines expectations' from 'greatly exceeds', articulated in calibration via 'laddering'.",
    "The opportunity arose from a paternity-leave domino where everyone took n+1 work, but he argues you can increase your 'luck surface area' by positioning yourself as the go-to domain expert (in his case, web platform).",
    "His IC6 promo came from a hard-deadline web project where he flexed into the product-hybrid archetype amid 'fog of war' ambiguity with only part-time PM support; his rule is to cut scope before cutting quality.",
    "There is an IC4, IC5, and IC6 way to solve almost any problem: IC4 adds one React error boundary, IC5 audits and hardens the whole site, IC6 writes the direction-setting note and lint rules so the entire company applies the fix without him \u2014 that is leverage.",
    "He deliberately switched to Jake Bolam's IG Web team when web stopped being a priority in his org, aligning his specialty with business priorities, and rewrote Instagram web's aging notifications panel.",
    "On Threads Web he was the sole engineer for the first 6-8 weeks \u2014 creating the code-name folder in the monorepo himself \u2014 then hired and TL'd the team through launch of logged-out and logged-in clients; the IC7 promo self-review was his easiest ever because attribution was unambiguous.",
    "Ownership means recursive accountability: delegating pieces to senior engineers never absolves the overall DRI; his mentorship model is a driving instructor with a second steering wheel who gradually backs off as trust builds.",
    "He landed nearly 2,000 diffs in the Threads launch year (~10 per working day) while cautioning that diff counts are only directionally interesting and gameable.",
    "IC7+ promotions require a business need \u2014 'an IC7-shaped hole that can only be plugged by an IC7-shaped puzzle piece' \u2014 so delivery alone is not enough without the right opportunity.",
    "Every level scared him before he reached it (he once swore he'd never consider IC7); his advice to his younger self, who wrote a blog post every week for years, is 'chill a little bit, it's gonna be fine' \u2014 though that public writing is what first got him recruited."

   "id": "ep:cloudkitchens-cto-on-intelligence",
   "type": "episode",
   "label": "CloudKitchens CTO on Intelligence, Regrets, Steve Jobs and Travis Kalanick Stories",
   "n": 20,
   "date": "2025-11-21",
   "url": "https://www.developing.dev/p/cloudkitchens-cto-on-intelligence",
   "guest": "Brian Attwell",
   "guest_role": "CTO of CloudKitchens, ex-Uber Senior Staff, ex-Google, ex-Apple intern",
   "takeaways": [
    "Brian reached Senior Staff at Uber by 25 through 90-100 hour weeks: he and a peer prototyped the options their team debated each day after hours, becoming de facto tech leads within months and top-3 committers across Uber mobile; he claims career growth vs hours worked is superlinear because strategic work only goes to the already-proven.",
    "The cost was real: he once collapsed on a street walking home from Uber, unable to move for 15 minutes; his burnout early-warning signal now is becoming grumpy and impatient, usually flagged by his partner.",
    "Luck dominates infrequent decisions like choosing a company every few years, but not high-frequency daily actions; picking a meritocratic culture is the biggest controllable-yet-lucky variable.",
    "He argues IQ correlating with job performance is one of the most well-researched results in applied psychology; good interviews force on-the-spot reasoning (e.g., read a 5-page postmortem in 5 minutes and debate restructuring the team), LeetCode is just a gameable IQ proxy, and he is seriously considering literal IQ screens, starting with PM interviews.",
    "His prioritization formula: expected value of the work times probability of success with-vs-without you, divided by your time cost; this often means avoiding the company's well-staffed top priority in favor of being the hero on priority #3, and juniors should mine planning spreadsheets' 'why we care' columns to build expected-value intuition.",
    "He procrastinated on management so badly that a report asked after three months whether Brian was actually his boss; after committing, his org doubled every six months, driven by assuming every inherited org has an order-of-magnitude improvement and truth-seeking with the team (e.g., killing low-value integrations among 1,200 cut pages and improved the product).",
    "CloudKitchens rebuilt its leveling ladder after Travis Kalanick rejected an Uber-style draft as lazily over-indexed on scope: ~1,000 real performance examples from books and calibration notes were distilled to 250 attributes and PCA-collapsed into 12 skill gradients rewarding truth-seeking (being right when questioning foundational decisions) rather than position-oriented, politics-rewarding competencies like influencing other teams.",
    "On big tech honesty: Amazon-style companies underpay top performers 'because they can get away with it'; at Google a non-performer was protected for being likable, and several managers told him of an unwritten policy of retaining idle smart people so competitors couldn't hire them; standards fall entropically until a company dies or a trauma (like the DeepMind existential push) resets them.",
    "CloudKitchens' thesis: in a few decades no one should cook their own food; they have robots cutting restaurant labor costs 50%, logistics cutting meal costs 30-40%, real estate halving cost per meal, and Otter processing 18% of the world's orders, chasing trillions in the $2.5T/year US food market while staying stealth to avoid press distraction and copycat competitors.",
    "As an Apple intern he accidentally killed his own sunlight-readability project by downplaying it in front of Steve Jobs, who rolled his eyes and walked away; he doesn't regret failures he couldn't avoid, only moments he knew the truth mid-project and stayed silent. Advice to his younger self: be more courageous, less embarrassed, and possibly go to therapy."

   "id": "ep:uber-distinguished-eng-on-unfair",
   "type": "episode",
   "label": "Uber Distinguished Eng On Unfair Promos, Influence, Engineering Regrets (Career Story)",
   "n": 19,
   "date": "2025-11-11",
   "url": "https://www.developing.dev/p/uber-distinguished-eng-on-unfair",
   "guest": "Joakim Recht",
   "guest_role": "Former Distinguished Engineer at Uber, now AI startup engineer",
   "takeaways": [
    "Joakim's Distinguished-level project (Odin) began as his Denmark team running MySQL shards in Docker with declarative intent-based management when Kubernetes was barely in alpha, and grew into the platform for all of Uber's stateful workloads: ~120,000 physical servers and ~500,000 databases operated by a team of about 20.",
    "Platform adoption strategy: build it and prove it on your own team first, expand through friendly orgs to skeptics rather than forcing it; but a final top-down mandate ('you will not be allowed to have your own service any longer') was still necessary, because full alignment never happens bottom-up alone.",
    "His model of promotions: level tracks how many people are affected by your work, so a project with natural scope expansion drags promotions along automatically for you and the whole team; his Senior-to-Principal-to-Distinguished steps each followed a stage of Odin's growth, helped by the luck of one long-running project.",
    "Promo committees are structurally unfair: his first one reviewed hundreds of engineers in a single day with no prep or materials, decided by how well each manager pitched; even structured processes can't handle dependencies that ghost you, canceled projects, or isolated teams who were never told what good looks like.",
    "His core promo advice: software engineers must write code at every level, ideally every day; craftsmanship is learned by watching others; 'running code beats perfect code any day'; and instead of hunting promotion-worthy scope, focus on providing value and the promotion will follow.",
    "Contrarian delegation take: staying hands-on preserves system knowledge and trust; delegate the hard interesting work down to people who can barely manage it so they grow fast, and keep the boring 'shoveling shit' work yourself since you have nothing left to prove.",
    "Engineers don't trust management because authority without demonstrated understanding earns polite nods and silent non-compliance; his best influence outcome is overhearing someone champion, as their own conviction, an idea they once rejected from him.",
    "Mentorship: pick mentees outside your own org to learn about other parts of the company and plant seeds of culture change in distant teams; keep mentoring informal with no programs or schedules, and don't disqualify mentees for asking the wrong questions.",
    "Senior-level politics was the scary discovery that 'nobody's in control, there's an illusion of control'; he coped by saying no a lot, avoiding dead-end projects, and using the Denmark timezone as a shield that limited exposure to SF meetings to a couple of evening hours.",
    "He left Uber when new management imposed top-down decisions engineers couldn't stand behind, notably a cloud migration justified on cost that no engineer believed and that only worked after a 50% cost cut that would have been cheaper on-prem; refusing to 'stick around and take the money,' he joined an AI enterprise automation startup rather than follow ex-colleagues to Databricks.",

   "takeaways": [
    "Early Mozilla had no onboarding guardrails ('get on IRC and Bugzilla and figure things out'), which selected for self-motivated engineers; code ownership worked by 'who owns this?' \u2014 'you do now'.",
    "Google was originally Firefox's biggest ally \u2014 the default-search deal made Mozilla financially sustainable \u2014 but after Chrome launched in 2008 the relationship decayed through organizational incentives, the 'year of a hundred oopses' of always-unintentional Download Chrome banners on google.com.",
    "Firefox genuinely fell behind Chrome on multi-process architecture, plugin sandboxing, and JavaScript speed, while Mozilla's failed Firefox OS mobile bet drained resources exactly when the browser needed them most.",
    "Bobby self-initiated 'Slaughterhouse', a year-plus effort to architecturally eliminate a class of JS/DOM-binding exploits; when Mozilla's Bugzilla was compromised by a threat actor, all but about 2 of roughly 45 exfiltrated security bugs were already fixed \u2014 proof you must get ahead of security before you lose the luxury of time.",
    "He once accused a friendly security researcher of selling Mozilla out after recognizing his exploit-writing style in an in-the-wild zero-day; the researcher went off the grid and resurfaced via a bowling-alley phone call weeks later \u2014 the actual breach was Mozilla's own bug tracker.",
    "Rust was Mozilla's answer to C++ memory-safety exploits and single-threaded engines on multi-core hardware; a dozen Servo engineers couldn't out-build hundreds of Chromium engineers, so Mozilla uplifted Servo's parallel CSS engine into Firefox Quantum (led by Bobby), improving Amazon.com rendering ~25%.",
    "Quantum's launch made him one of fewer than five principal engineers at Mozilla; his manager then made him spend one day a week without opening a terminal to think about broader impact.",
    "On promos: focus on impact, not titles \u2014 promo-hacking and box-checking is 'extremely annoying' to leadership, and 'you don't want the people in leadership to find you to be annoying'; frame updates as visibility and team credit, not self-promotion.",
    "The CTO told him new Distinguished Engineers would be named for the first time in nearly a decade \u2014 and he wouldn't be one, because the bar had shifted from codebase mastery to industry-wide impact; he found it inspiring, like discovering an untrained muscle, and later made DE under a hybrid of both definitions.",
    "Mozilla's DE archetypes are world-changing IC impact: Martin Thomson (HTTP/2, QUIC, WebRTC standards), Luke Wagner (asm.js to WebAssembly, forging cross-browser consensus), Timothy Terriberry (Opus/Daala to royalty-free AV1 video).",
    "His top advice for aspiring DEs is to write: writing is the process of thinking, and you should not have an LLM write for you because you lose the thinking that drives growth; documents should be no longer than what you have to say.",
    "On the AI browser wars: most 'AI browsers' are front ends on Chromium; Firefox is the last independent engine, which is a business cost center but buys a seat at the standards table. AI in consumer tech is 'water running downhill'; the risks are the web becoming a backend detail for agents and Chrome's unspecified proprietary browser-LLM APIs entrenching Gemini."
   ],

   "takeaways": [
    "Microsoft levels run 59-70+ with two levels per title band and three principal levels; you can't tell someone's exact level from their title, and Distinguished Engineer (70) is the final partner level, below only Technical Fellow.",
    "He differentiated at the college career fair by demoing a self-built game on a laptop, landing a Microsoft internship in 2006 when interviews were puzzles (Die Hard 3 water jugs, counting gas stations in Florida) rather than LeetCode.",
    "His early-career engine was 'code is currency': troll forums for customer problems, build the prototype first, then show PMs and architects \u2014 first promotion came 8 months in, and a director told people 'David has energy, go talk to him'.",
    "SignalR began as his own nights-and-weekends project (inspired by Google Docs co-editing, pre-WebSockets) that Microsoft later made official with a team of ~8 \u2014 proof that 'you can just do things'; a good track record then earns you more leeway to fail and try things.",
    "He deliberately attached himself to an architect whose career he wanted (David Ebbo), coding his ideas and mimicking his behaviors until he became one himself, and later requested a Technical Fellow mentor (Jeffrey Snover, PowerShell inventor) once he decided he wanted DE.",
    "The senior-to-principal leap is doing more through others: as senior-level co-architect of .NET Core with ~30 engineers, trying to co-review every change burned him out within a year, forcing him to learn delegation, trust, and letting people fail.",
    "Distinguished promotion is peer-reviewed by technical fellows against a decade-long body of work; his package leaned on ~7 years of deferred .NET Core impact. Guido van Rossum shares his level, and Technical Fellows (Anders Hejlsberg, Dave Cutler) require industry-wide impact \u2014 'everyone's a unicorn'.",
    "Best mentor advice he got: go directly to the promotion deciders and ask where you stand, and amplify strengths to superhuman rather than fixing weaknesses \u2014 'no one gets promoted to these roles for being average'.",
    "To escape the partner-level meeting trap, he blocks a minimum of 8 hours a week to think and build ('decline, decline, decline') and still sends pull requests daily, refusing to be an architect who doesn't know the code.",
    "Interviews test writing new code but the higher-leverage skill is debugging \u2014 he'd hand candidates a crash dump; universities should teach making surgical fixes in huge existing codebases, since CS is not software engineering.",
    "Big-company tips: before changing roles ask when the last reorg was (reorgs reveal where the org is heading), and evaluate a job move by what you'd hate, not what you'd love.",
    "He turned down better pre-IPO Twitter and GitHub offers to stay (accumulated network, autonomy, a new project every two years), was depressed for a week when Twitter IPO'd, yet would tell a mentee today to take the hot outside offer; 10 years on .NET Core taught him every punted small issue eventually becomes a big one.",
    "The Ballmer-to-Satya culture change was from competing teams and shouting matches to incentivized collaboration \u2014 reviews dinged you for cloning another team's work and leaders modeled pulling quiet people into conversations.",
    "Regrets and advice: early arrogance ('being right means nothing' without patience and empathy), passing on a friend's 2008 Bitcoin venture, and \u2014 for his younger self \u2014 negotiate your salary and get multiple offers."

    "Being a manager and being an IC are different jobs: if you try management, do it full time rather than alongside IC work, ideally somewhere that allows a trial-and-return; he first tries to talk people out of management, which only fits if you draw energy from getting more out of others.",

    "The VP-vs-senior-EM jump was about leading functions beyond engineering (design, product, partnerships) and losing the confidence of being able to do every job in the org; other functions don't exist to 'feed the engineers'.",
    "Communication: speaking improves only with deliberate reps (his manager booked him 1000-person keynotes); senior leaders are 'always on stage'; keep dynamic range so people believe you; circulate drafts of important writing to reviewers, a habit learned at Stripe.",

   "takeaways": [
    "Ryan started the podcast as deliberate practice for speaking: publishing forces him to pore over every word in editing, a far stronger feedback loop than Toastmasters, and he set a deliberately lax goal of one episode per month.",
    "The format is inspired by internal Facebook career-story posts written by very senior ICs, 50-minute reads Ryan devoured early in his career, hence having super-senior engineers tell their career stories on the show.",
    "The Philip Su episode was the first breakout: 'the graphs were all going vertical' within a day or two, which Ryan read as product-market fit for hidden senior-IC career stories.",
    "The Ethan Evans episode confirmed the pattern; Ryan calls Evans one of the best speakers he's seen in tech, and its aggressive trailer worked so well he plans tasteful trailers on YouTube but minimal or no trailers on Spotify/Apple for recurring listeners.",
    "His dream guest list targets hidden super-senior engineers famous only inside their orgs; since LinkedIn and Google can't surface them, he sources through his big-tech network and by asking the audience which senior IC in their org impresses them, which has produced upcoming Apple/Google/Microsoft guests.",
    "The hardest podcasting-specific habit change: suppressing verbal backchannel (uh-huh, right, yeah) while guests speak and nodding vigorously instead, because acknowledgment noises ruin the audio.",
    "Balancing content with a full-time Meta job is brutal: for about two years he stayed up until 4:00 AM every Thursday writing the newsletter, and Gergely Orosz's warning about 'burning the candle at both ends' proved right."

   "takeaways": [
    "Mai's first week at Amazon (2012, early self-service advertising) began with his manager committing the team to a 6-8 month nights-and-weekends death march; 50-60 hour weeks were fairly common for ambitious big-tech engineers.",
    "His manager transition came prematurely and took ~18 months of failing; the core early mistake was not knowing how to get reports to reveal their real goals, fixed via active listening instead of transactional API-style one-on-ones.",
    "Storytelling is a bedrock manager skill: narrate the team's trajectory and define winning, because a team that feels it's winning avoids zero-sum politics, which fester exactly when winning slows down.",
    "Manager-of-managers is a different job with real 'mutiny' risk: in flat orgs, leaf managers advance by displacing those above them via skip-level griping; and two teams given overlapping charters will undercut each other rather than run a clean experiment.",
    "Senior leaders have fewer, more binary levers: you cannot do an underperforming manager's job for them, and at the top (e.g. Zuckerberg with an SVP) underperformance simply means being let go, not coached.",
    "Managers are not layoff-proof: companies target manager-to-IC ratios and span-of-control reductions put managers first on the chopping block.",
    "Amazon and Meta performance systems converge: public ratings plus a private VP/director process (Amazon 'top tier', Meta discretionary equity) picks linchpins by trajectory and irreplaceability; Meta pays its top quintile dramatically more (some cleared 2x peers) while frugal Amazon pulls that back.",
    "The performance process costs roughly $15,000 per engineer per cycle by his own estimate, but 'the integrity of the performance review process is the whole ball game' - if people stop believing it rewards performance, they stop performing.",
    "Low-performer quotas are universal at scale: roughly 7-15% (up to 20%) get pushed into the bottom bucket ('needs improvement' at Amazon, 'meets some/meets most' at Meta), where PIPs engage; the nightmare is a director forcing a manager to retroactively downgrade someone they praised.",
    "PIPs are first a legal paper trail, but people genuinely escape them because the trail loses legal credibility if nobody survives; Amazon HR was savage box-checking while Meta HR exhausted every avenue to protect its employer reputation.",
    "AI cheating has made remote interviews 'horrible' and focus/copy-paste detection only catches the unsophisticated; he expects assessments to evolve (low-level design, AI-allowed assignments) rather than anti-cheat to win, and notes cheaters get destroyed by ruthless performance management once hired.",
    "For OpenAI/Anthropic interviews: OpenAI notoriously reuses question areas, and behavioral rounds reward raw technical achievement - the staff-engineer 'seven docs and six aligned teams' story lands poorly there.",
    "Job hopping helps ambitious juniors but is a red flag at senior levels (staff+ moving every 18-24 months gets second-guessed); conversely, deep tenure's credibility snowball can become a shackle if you're forever known for one system.",
    "Advice to younger self: find mentors instead of going alone, and write explicit plans with high agency - walking into his director's office with a list of things he didn't yet know how to do was the moment his director knew he'd succeed."

    "Being comfortable in ambiguous, poorly defined spaces is a differentiating asset in big tech, where many strong engineers need clear specs before they can execute.",
    "On an experimental hardware team he landed only ~2 diffs in 6 months; the team was explicitly reviewed on de-risking directions, showing how big tech protects risk-takers from performance-review downside without guaranteeing promos.",
    "He was recruited to Threads pre-launch because of his prototyping reputation, and responded by immediately building a working Instagram-to-Mastodon (ActivityPub) bridge and a stripped-down text-first Instagram iOS app over Christmas break.",
    "Threads went from first prototype to public launch in about 5-6 months with a small team built on Instagram's primitives, timed against Musk's Twitter acquisition, and became Meta's poster child for lean product building.",
    "The Instagram blockchain/NFT team taught him that products usually fail on misaligned business incentives rather than technology; the project died with crypto winter.",
    "Prototypes are the highest-fidelity communication medium: his GPT-3-era RAG demo over Facebook's help FAQ drew about 50 cold reach-outs from across the company, building visibility that documents can't.",
    "Goodhart's law makes any chosen metric degrade as people game it, and much of what matters isn't measurable, but large companies still need frameworks because nothing else scales.",
    "His advice to his younger self: don't obsess over fixing weaknesses; keep them out of your way and position yourself where your strengths shine.",
    "He left Meta for startups because it's a two-way door: financially irrational but a real test of what your ideas are worth, and big tech will hire you back."

    "Dwayne interviewed at pre-IPO Facebook only as practice for Google but was won over by real engineering problems (memcache scaling, custom PHP runtime) and care signals like an unsolicited offer increase and CTO Bret Taylor taking MIT new grads to lunch.",

    "Static typing wins at industry scale because large codebases are an information-communication problem: types communicate intent, power tooling, and provably eliminate classes of errors.",

    "He became a TLM reluctantly, scaled to ~13 reports including managers, but coached ICs well while giving org design 'vibe management'; he returned to IC because replacing a manager for 6-7 people was easier than replacing a tech lead for 35-40.",
    "IC7 came while still a manager, credited to his technical vision: by then virtually the whole codebase was strict Hack, up from 5-10% of files in 2015.",

   "takeaways": [
    "Nachenberg rose from Symantec's first intern (1992, Peter Norton Group) to its senior-most engineer (Fellow, IC10/VP-equivalent) by repeatedly finding gaps: impactful projects the business needed that nobody was doing, like detecting polymorphic self-mutating viruses. Symantec never assigned him work; he picked all his own projects.",
    "Symantec promoted to Distinguished Engineer and Fellow via a company-wide committee of technologists led by the CTO that reviewed portfolios quarterly for cross-division consistency; Nachenberg was made Fellow without even applying after the Veritas merger forced a level-set.",
    "Top-level IC hiring is network-driven: Symantec's ex-COO pulled him into GoogleX with no application; the loop was ~8 interviews with no coding questions, mostly leadership discussion and sales pitches. Still, Google leveled him down from a Symantec L10-equivalent to L8 because 'we can't just hire fellows.'",
    "Imposter syndrome kept him at Symantec 21+ years even after he stopped growing and being happy; only an external pull ('we want to interview you') got him to leave. His biggest regret is not leaving earlier \u2014 stay only as long as you're learning.",
    "Intelligence matters less than communication, collaboration, and outcome focus: he knew a 200-IQ engineer stuck at L4 at Google due to poor communication and no business impact. Focusing on the company's/customer's outcomes and their metrics beats being smart.",
    "At GoogleX/Chronicle he worked on Backstory, which ingested and indexed petabytes of enterprise security telemetry so threat-hunting queries that previously took 30 minutes ran in about two seconds.",
    "At Lyft he drove the shift from hand-coded, hand-parametrized robotics driving algorithms to an end-to-end neural-network driver wrapped in a deterministic safety layer, achieved purely through influence with skeptical roboticists \u2014 then lost credit because he let others tell the story; document your accomplishments and claim specific, unembellished credit.",
