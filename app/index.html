    "Trust is the code machine's currency: after burning credibility with a rushed bug, he publicly told the push team 'if this breaks the site, I will resign' \u2014 seriously \u2014 to force his own triple-checking and rebuild trust with the teams that shipped his code.",
    "As IC7 he spent ~30% of focus on his team and ~70% on codebase-wide initiatives, nominally reporting to junior managers while effectively reviewed by his skip and meeting a VP monthly; he aggressively declined meetings and standups to protect coding time.",
    "Zuck stories: he built emoji-reactions-on-any-post with Zuckerberg at a 2009 hackathon (code too bad to ship, but the idea became the industry norm), and during the 2010 Google Plus lockdown a company-wide bet got Zuck to personally merge a PR in exchange for Novati giving up office ripsticking.",

    "On LLMs: they are the Vim-to-VSCode leap repeated; he produces ~5x more code in Formation's ~500k-line codebase by prompting for code he already sees in his head. Near-term AI amplifies experienced engineers with strong taste; long-term, AI managing its own services behind API contracts may make human-readable code irrelevant.",

const degree = new Map(DATA.nodes.map(n => [n.id, adj.get(n.id).length]));

// ---------- sizes ----------

  : n.type === 'person' ? 6.5
  : Math.max(6, Math.min(16, 4 + Math.sqrt(degree.get(n.id)) * 1.6));

// ---------- state ----------
const visible = { episode:true, person:true, org:true, concept:true };

// ---------- legend / filters ----------

  chip.onclick = () => { visible[t] = !visible[t]; chip.classList.toggle('off', !visible[t]); refresh(); };
  legendEl.appendChild(chip);
});

// ---------- theme ----------
document.getElementById('themeBtn').onclick = () => {
  const cur = document.documentElement.dataset.theme;
  const osDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const effDark = cur ? cur === 'dark' : osDark;
  document.documentElement.dataset.theme = effDark ? 'light' : 'dark';
  restyle();
};

const gLinks = gRoot.append('g');

svg.call(d3.zoom().scaleExtent([0.15, 5]).on('zoom', e => gRoot.attr('transform', e.transform)));
svg.on('click', () => select(null));

const links = DATA.links.map(l => ({ ...l }));
const nodes = DATA.nodes.map(n => ({ ...n }));

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id)
    .distance(l => l.kind === 'guest_of' ? 34 : l.kind === 'related' ? 90 : 78)
    .strength(l => l.kind === 'guest_of' ? 0.9 : l.kind === 'related' ? 0.25 : 0.06))
  .force('charge', d3.forceManyBody().strength(-95).distanceMax(420))
  .force('center', d3.forceCenter(W()/2, H()/2))
  .force('collide', d3.forceCollide().radius(d => R(d) + 4))
  .force('x', d3.forceX(W()/2).strength(0.045))
  .force('y', d3.forceY(H()/2).strength(0.055));

const linkSel = gLinks.selectAll('line').data(links).join('line')
  .attr('stroke-linecap','round');
const nodeSel = gNodes.selectAll('circle').data(nodes).join('circle')
  .attr('r', d => R(d))
  .attr('tabindex', 0)
  .style('cursor','pointer')
  .call(d3.drag()
    .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e,d) => { if (!e.active) sim.alphaTarget(0); }))
  .on('click', (e,d) => { e.stopPropagation(); select(d.id); })
  .on('mouseover', (e,d) => showTip(e,d)).on('mousemove', (e,d) => showTip(e,d))
  .on('mouseout', hideTip);

const labelSel = gLabels.selectAll('text').data(nodes).join('text')
  .text(d => shortLabel(d))
  .attr('font-size', d => d.type==='episode' ? 9.5 : d.type==='concept'||d.type==='org' ? 10.5 : 9)
  .attr('text-anchor','middle')
  .style('pointer-events','none');

function shortLabel(d) {
  if (d.type === 'episode') return '#' + d.n;
  const s = d.label.split(/[:|(]/)[0].trim();
  return s.length > 24 ? s.slice(0, 22) + '…' : s;
}

sim.on('tick', () => {
  linkSel.attr('x1', d=>d.source.x).attr('y1', d=>d.source.y).attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
  nodeSel.attr('cx', d=>d.x).attr('cy', d=>d.y);
  labelSel.attr('x', d=>d.x).attr('y', d=>d.y + R(d) + 10);
});

// ---------- styling / refresh ----------
function neighborIds(id) { return new Set(adj.get(id).map(a => a.id)); }
function matches(n) {
  if (!searchTerm) return true;
  const hay = (n.label + ' ' + (n.guest||'') + ' ' + (n.guest_role||'')).toLowerCase();
  return hay.includes(searchTerm);
}
function refresh() {
  const focus = selected ? neighborIds(selected) : null;
  const anySearch = !!searchTerm;
  nodeSel
    .attr('fill', d => col(d.type))
    .attr('stroke', d => d.id === selected ? 'var(--hl)' : 'var(--surface-1)')
    .attr('stroke-width', d => d.id === selected ? 3 : 1.5)
    .style('display', d => visible[d.type] ? null : 'none')
    .attr('opacity', d => {
      if (selected) return d.id === selected || focus.has(d.id) ? 1 : 0.12;
      if (anySearch) return matches(d) ? 1 : 0.10;
      return 1;
    });
  labelSel
    .attr('fill', 'var(--ink-2)')
    .style('display', d => {
      if (!visible[d.type]) return 'none';
      if (selected) return (d.id === selected || focus.has(d.id)) ? null : 'none';
      if (anySearch) return matches(d) ? null : 'none';
      return (d.type !== 'episode' || degree.get(d.id) > 8) ? null : 'none';
    });
  linkSel
    .attr('stroke', l => l.kind === 'related' ? 'var(--hl)' : 'var(--axis)')
    .attr('stroke-dasharray', l => l.kind === 'related' ? '4 4' : null)
    .style('display', l => (visible[l.source.type] && visible[l.target.type]) ? null : 'none')
    .attr('stroke-width', l => {
      const on = selected && (l.source.id === selected || l.target.id === selected);
      return on ? 2 : l.kind === 'guest_of' ? 1.4 : 1;
    })
    .attr('opacity', l => {
      if (selected) return (l.source.id === selected || l.target.id === selected) ? 0.85 : 0.04;
      if (anySearch) return 0.06;
      return l.kind === 'guest_of' ? 0.5 : l.kind === 'related' ? 0.35 : 0.07;
    });
}
function restyle(){ refresh(); }

// ---------- tooltip ----------
const tip = document.getElementById('tooltip');
function showTip(e, d) {
  tip.innerHTML = d.type === 'episode'
    ? `<b>#${d.n} · ${esc(d.guest || '')}</b><br>${esc(d.label)}`
    : `<b>${esc(d.label)}</b>${d.role ? '<br>' + esc(d.role) : ''}${d.count ? '<br>' + d.count + ' episodes' : ''}`;
  const r = document.getElementById('graphWrap').getBoundingClientRect();
  tip.style.left = Math.min(e.clientX - r.left + 14, r.width - 310) + 'px';
  tip.style.top = (e.clientY - r.top + 10) + 'px';
  tip.style.opacity = 1;
}
function hideTip(){ tip.style.opacity = 0; }

// ---------- selection / detail panel ----------
const panel = document.getElementById('panel');
function esc(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function nodeLinkHTML(id, why) {
  const n = byId.get(id); if (!n) return '';
  const head = n.type === 'episode' ? `<span class="k">#${n.n}</span> ${esc(n.label)}` : `<span class="k">${esc(n.label)}</span>`;
  return `<div class="nodeLink" data-id="${esc(id)}">${head}${why ? `<span class="why">${esc(why)}</span>` : ''}</div>`;
}
function select(id) {
  selected = id;
  refresh();
  if (!id) { renderHome(); return; }
  const n = byId.get(id);
  const badge = `<span class="badge" style="background:${col(n.type)}">${n.type}</span>`;
  let html = badge;
  if (n.type === 'episode') {
    html += `<h2>${esc(n.label)}</h2>
      <div class="meta">#${n.n} · ${esc(n.date)} · <a href="${esc(n.url)}" target="_blank" rel="noopener">developing.dev ↗</a></div>`;
    if (n.guest) html += `<div class="small"><b style="color:var(--ink-1)">${esc(n.guest)}</b> — ${esc(n.guest_role || '')}</div>`;
    if (!n.complete) html += `<div class="warn">⚠ Transcript partially available for this episode (early summary-only post or long-episode cutoff).</div>`;
    if (n.takeaways?.length) html += `<h3>Key takeaways</h3><ul>` + n.takeaways.map(t => `<li>${esc(t)}</li>`).join('') + `</ul>`;
    if (n.quotes?.length) html += `<h3>Notable quotes</h3>` + n.quotes.map(q => `<div class="quote">“${esc(q.quote)}”<span class="who">— ${esc(q.speaker)}${q.t ? ' · ' + esc(q.t) : ''}</span></div>`).join('');
    const rel = adj.get(id).filter(a => a.kind === 'related');
    if (rel.length) html += `<h3>Related episodes</h3>` + rel.map(a => nodeLinkHTML(a.id, a.reason)).join('');
    const cs = adj.get(id).filter(a => byId.get(a.id)?.type === 'concept');
    if (cs.length) html += `<h3>Topics</h3>` + cs.map(a => nodeLinkHTML(a.id)).join('');
    const os = adj.get(id).filter(a => byId.get(a.id)?.type === 'org');
    if (os.length) html += `<h3>Organizations</h3>` + os.map(a => nodeLinkHTML(a.id)).join('');
    if (n.sections?.length) html += `<h3>Chapters</h3>` + n.sections.map(s => `<div class="sect"><span>${esc(s.t)}</span><b>${esc(s.title)}</b></div>`).join('');
  } else {
    html += `<h2>${esc(n.label)}</h2>`;
    if (n.role) html += `<div class="meta">${esc(n.role)}</div>`;
    const eps = adj.get(id).filter(a => byId.get(a.id)?.type === 'episode')
      .sort((a,b) => (byId.get(b.id).n||0) - (byId.get(a.id).n||0));
    html += `<h3>${n.type === 'person' ? 'Appears in' : 'Episodes'} (${eps.length})</h3>` + eps.map(a => nodeLinkHTML(a.id)).join('');
    if (n.type !== 'person') {
      const ppl = [...new Set(eps.map(a => byId.get(a.id).guest).filter(Boolean))];
      if (ppl.length) html += `<h3>Guests</h3><div class="small">${ppl.map(esc).join(' · ')}</div>`;
    }
  }
  panel.innerHTML = html;
  panel.scrollTop = 0;
  panel.querySelectorAll('.nodeLink').forEach(el => el.onclick = () => select(el.dataset.id));
}
function renderHome() {
  const s = DATA.stats;
  panel.innerHTML = `
    <h2>The Peterman Post knowledge base</h2>
    <div class="meta">Ryan Peterman's podcast on developing.dev · generated ${esc(DATA.generated)}</div>
    <div class="small">Interviews with Turing Award winners, distinguished engineers, CTOs and founders about software careers and computer science — compiled into a browsable knowledge graph.</div>
    <h3>In the graph</h3>
    <ul>
      <li><b style="color:var(--ink-1)">${s.episodes}</b> episodes (Jan 2025 – Jul 2026)</li>
      <li><b style="color:var(--ink-1)">${s.people}</b> guests</li>
      <li><b style="color:var(--ink-1)">${s.orgs}</b> organizations</li>
      <li><b style="color:var(--ink-1)">${s.concepts}</b> concepts / themes</li>
      <li><b style="color:var(--ink-1)">${s.links}</b> connections</li>
    </ul>
    <h3>How to use</h3>
    <ul>
      <li>Click any node — episodes show takeaways, quotes, chapters and related episodes.</li>
      <li>Click a <span style="color:var(--c-concept);font-weight:600">concept</span> (e.g. Promotions) to see every episode that covers it.</li>
      <li>Use the legend chips to hide/show node types; search to find anything.</li>
      <li>Dashed red edges are editorially related episodes.</li>
    </ul>
    <h3>Start somewhere interesting</h3>
    ${['c:promotions','c:ai-era-engineering','c:regrets-and-advice','o:meta','p:ethan-evans'].map(id => nodeLinkHTML(id)).join('')}`;
  panel.querySelectorAll('.nodeLink').forEach(el => el.onclick = () => select(el.dataset.id));
}

// ---------- search ----------
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  refresh();
});

// ---------- list view ----------
const listView = document.getElementById('listView');
function renderList() {
  const eps = nodes.filter(n => n.type === 'episode').sort((a,b) => b.n - a.n);
  listView.innerHTML = eps.map(n => `
    <div class="epRow" data-id="${esc(n.id)}">
      <span class="n">#${n.n}</span>
      <span class="t">${esc(n.label)}<span class="g">${esc(n.guest || '')}${n.guest_role ? ' — ' + esc(n.guest_role) : ''}</span></span>
      <span class="d">${esc(n.date)}</span>
    </div>`).join('');
  listView.querySelectorAll('.epRow').forEach(el => el.onclick = () => {
    document.querySelector('.tab[data-tab="graph"]').click();
    select(el.dataset.id);
  });
}
renderList();

// ---------- tabs ----------
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
  const graphMode = t.dataset.tab === 'graph';
  document.getElementById('graphWrap').style.display = graphMode ? '' : 'none';
  listView.style.display = graphMode ? 'none' : 'block';
});

refresh();
renderHome();
</script>
</body>
</html>
